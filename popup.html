<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email Writer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <h1 class="popup-title">Email Writer</h1>
        <p class="popup-subtitle">
          In Gmail, click the <strong>AI</strong> button on the compose window, describe the reply you want, and it is inserted into the message body.
        </p>
      </header>

      <details class="settings-disclosure" open>
        <summary class="settings-summary">API &amp; model</summary>
        <div class="settings-card">
          <label class="field-label" for="apiKeyInput">OpenRouter API key</label>
          <input
            type="password"
            id="apiKeyInput"
            class="field-input"
            placeholder="sk-or-…"
            readonly
            autocomplete="off"
            spellcheck="false"
          />
          <button type="button" id="editApiKeyButton" class="btn btn-cta btn-inline">Edit key</button>

          <label class="field-label field-label-spaced" for="modelInput">Model ID</label>
          <input
            type="text"
            id="modelInput"
            class="field-input"
            placeholder="openai/gpt-4o-mini"
            autocomplete="off"
            spellcheck="false"
          />
          <p class="field-hint">Examples: <code>openai/gpt-4o-mini</code>, <code>anthropic/claude-3.5-sonnet</code></p>

          <button type="button" id="saveButton" class="btn btn-cta btn-block">Save settings</button>
        </div>
      </details>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
