<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email Writer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <h1 class="popup-title">Email Writer</h1>
        <p class="popup-subtitle">
          In Gmail, click the <strong>AI</strong> button on the compose window, describe the reply you want, and it is inserted into the message body.
        </p>
      </header>

      <details class="settings-disclosure" open>
        <summary class="settings-summary">API &amp; model</summary>
        <div class="settings-card">
          <label class="field-label" for="apiKeyInput">OpenRouter API key</label>
          <input
            type="password"
            id="apiKeyInput"
            class="field-input"
            placeholder="sk-or-…"
            readonly
            autocomplete="off"
            spellcheck="false"
          />
          <button type="button" id="editApiKeyButton" class="btn btn-cta btn-inline">Edit key</button>

          <label class="field-label field-label-spaced" for="modelSelect">Model</label>
          <select id="modelSelect" class="field-input">
            <optgroup label="Recommended (Reliable)">
              <option value="openai/gpt-4o-mini">openai/gpt-4o-mini (Fast, cheap, reliable)</option>
              <option value="openai/gpt-4o">openai/gpt-4o (Best quality)</option>
              <option value="anthropic/claude-3.5-sonnet">anthropic/claude-3.5-sonnet (Great writing)</option>
              <option value="google/gemini-flash-1.5">google/gemini-flash-1.5 (Fast, cheap)</option>
            </optgroup>
            <optgroup label="Free Models (May be slow/unavailable)">
              <option value="openrouter/free">openrouter/free (Auto-pick free model)</option>
              <option value="meta-llama/llama-3.1-70b-instruct:free">llama-3.1-70b-instruct:free</option>
              <option value="meta-llama/llama-3.1-8b-instruct:free">llama-3.1-8b-instruct:free (Faster)</option>
              <option value="mistralai/mistral-7b-instruct:free">mistral-7b-instruct:free</option>
              <option value="google/gemma-2-9b-it:free">gemma-2-9b-it:free</option>
              <option value="qwen/qwen-2.5-72b-instruct:free">qwen-2.5-72b-instruct:free</option>
            </optgroup>
            <optgroup label="Other">
              <option value="custom">-- Custom model ID --</option>
            </optgroup>
          </select>
          <input
            type="text"
            id="modelInput"
            class="field-input"
            placeholder="Enter custom model ID..."
            autocomplete="off"
            spellcheck="false"
            style="display: none; margin-top: 8px;"
          />
          <p class="field-hint" id="modelHint">Free models are $0 but often overloaded. Paid models like gpt-4o-mini are fast & reliable.</p>

          <button type="button" id="saveButton" class="btn btn-cta btn-block">Save settings</button>
        </div>
      </details>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
